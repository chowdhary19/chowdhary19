<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="55%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39d353" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#121820" stroke-width="1"/>
    </pattern>
    <clipPath id="line1Clip">
      <rect x="64" y="176" width="0" height="28">
        <animate attributeName="width" values="0;0;360;360" keyTimes="0;0.04;0.16;1" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 0 0"/>
      </rect>
    </clipPath>
    <clipPath id="line2Clip">
      <rect x="64" y="206" width="0" height="22">
        <animate attributeName="width" values="0;0;720;720" keyTimes="0;0.19;0.40;1" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 0 0"/>
      </rect>
    </clipPath>
    <clipPath id="line3Clip">
      <rect x="64" y="234" width="0" height="20">
        <animate attributeName="width" values="0;0;430;430" keyTimes="0;0.43;0.58;1" dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 0 0"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <g>
    <rect x="-40" y="-40" width="1280" height="380" fill="url(#gridPattern)" opacity="0.6"/>
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;40 40;0 0" dur="9s" repeatCount="indefinite"/>
  </g>

  <rect x="0" y="0" width="1200" height="3" fill="url(#scanGrad)">
    <animate attributeName="y" values="-10;300;-10" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- terminal chrome -->
  <circle cx="30" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="30" r="6" fill="#27c93f"/>
  <text x="90" y="35" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="13" fill="#6e7681">yuvraj@synvolv:~$</text>

  <!-- title -->
  <text x="62" y="145" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="40" font-weight="700" fill="url(#titleGrad)">
    <tspan fill="#39d353">&#10095; </tspan>YUVRAJ SINGH CHOWDHARY
  </text>

  <!-- line 1: role -->
  <text x="64" y="196" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="22" font-weight="600" fill="#39d353" clip-path="url(#line1Clip)">Founding Systems Engineer</text>

  <!-- line 2: domains -->
  <text x="64" y="222" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#8b949e" clip-path="url(#line2Clip)">Runtime AI Infrastructure &#183; Financial Operating Systems &#183; Distributed Control Planes</text>

  <!-- line 3: tag -->
  <text x="64" y="248" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="600" fill="#a78bfa" clip-path="url(#line3Clip)">founder &#38; builder &#183; 0&#8594;1 systems ownership</text>

  <!-- cursor -->
  <rect x="425" y="234" width="10" height="18" fill="#a78bfa">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.57;0.60;0.68;0.76;0.84;0.92;1" dur="14s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom divider with sweep -->
  <line x1="0" y1="280" x2="1200" y2="280" stroke="#21262d" stroke-width="1.5"/>
  <rect x="-160" y="275" width="160" height="9" rx="4" fill="url(#sweepGrad)">
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;1360 0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
