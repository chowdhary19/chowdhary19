<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="170" viewBox="0 0 1400 170" role="img" aria-labelledby="title desc">
<title id="title">Builder mode</title>
<desc id="desc">How the work actually gets done, end to end.</desc>

<defs>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#F3EEE4" stroke-opacity=".018"/>
  </pattern>
  <linearGradient id="rightGlow" x1="0" y1="0" x2="1" y2="0">
    <stop stop-color="#D97757" stop-opacity="0"/>
    <stop offset="1" stop-color="#D97757" stop-opacity=".07"/>
  </linearGradient>
  <linearGradient id="panelGrad" x1="0" y1="0" x2="0.6" y2="1">
    <stop stop-color="#211D17"/>
    <stop offset="1" stop-color="#1C1914"/>
  </linearGradient>
  <linearGradient id="panelGradWarm" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#211D17"/>
    <stop offset="1" stop-color="#5A3626" stop-opacity=".35"/>
  </linearGradient>
  <linearGradient id="scanFadeY" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#E8977A" stop-opacity=".45"/>
    <stop offset="1" stop-color="#E8977A" stop-opacity="0"/>
  </linearGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .blink{animation:blink 1.1s steps(1,end) infinite}
    .scan-y{animation:scanY 7s linear infinite}
    .global-scan{animation:globalScan 13s linear infinite}
    .dash{stroke-dasharray:8 10;animation:dash 9s linear infinite}
    .pulse{animation:pulse 2.6s ease-in-out infinite}
    .pulse-ring{animation:pulseRing 2.6s ease-out infinite}
    .packet1{animation:packet1 7.5s linear infinite}
    .packet2{animation:packet2 9.5s linear infinite}
    .rise{animation:rise .7s cubic-bezier(.2,.8,.2,1) both}
    .sheen{animation:sheen 6s ease-in-out infinite}
    .type{width:0;animation-name:typeIn;animation-timing-function:steps(1,end);animation-fill-mode:both}
    .blink-in{animation-name:blinkIn;animation-timing-function:steps(1,end);animation-iteration-count:infinite;animation-fill-mode:backwards}
    .zoom{animation:zoom 16s ease-in-out infinite}
    @keyframes blink{50%{opacity:0}}
    @keyframes typeIn{from{width:0}to{width:var(--tw)}}
    @keyframes blinkIn{0%{opacity:0}0.01%,50%{opacity:1}50.01%,100%{opacity:0}}
    @keyframes zoom{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.045) translate(-0.6%,-0.4%)}}
    @keyframes scanY{from{transform:translateY(-90px)}to{transform:translateY(260px)}}
    @keyframes globalScan{from{transform:translateY(-120px)}to{transform:translateY(290px)}}
    @keyframes dash{to{stroke-dashoffset:-180}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes pulseRing{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(2.4)}}
    @keyframes packet1{0%{transform:translateX(0)}100%{transform:translateX(1030px)}}
    @keyframes packet2{0%{transform:translateX(0)}100%{transform:translateX(-1030px)}}
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes sheen{0%,35%{transform:translateX(-120%)}65%,100%{transform:translateX(120%)}}
    @media(prefers-reduced-motion:reduce){.blink,.scan-y,.global-scan,.dash,.pulse,.pulse-ring,.packet1,.packet2,.rise,.sheen,.zoom{animation:none!important}.type{animation:none!important;width:var(--tw)!important}.blink-in{animation:none!important;opacity:1!important}}
  </style>
</defs>

<rect width="1400" height="170" fill="#15130F"/>
<rect width="1400" height="170" fill="url(#grid)"/>
<rect x="1" y="1" width="1398" height="168" fill="none" stroke="#332E27"/>
<rect x="40" y="24" width="6" height="122" rx="3" fill="#D97757"/>
<text x="70" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="800" fill="#8FA888" text-anchor="start" opacity="1.0">$ builder_mode</text>
<text x="70" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700" fill="#F3EEE4" text-anchor="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" opacity="1.0">understand the business  -&gt;  find the invariant  -&gt;  build  -&gt;  operate  -&gt;  rewrite what reality disproves</text>
<text x="70" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="12" font-weight="650" fill="#8A8175" text-anchor="start" opacity="1.0">breadth is not the point; end-to-end ownership is</text>
</svg>