<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="fTitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#39d353"/>
    </linearGradient>
    <clipPath id="fLineClip">
      <rect x="0" y="-34" width="0" height="46">
        <animate attributeName="width" values="0;0;620;620" keyTimes="0;0.08;0.42;1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 0 0"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="220" fill="url(#fBgGrad)"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#21262d" stroke-width="1"/>

  <g transform="translate(290,95)" clip-path="url(#fLineClip)">
    <text x="0" y="0" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="30" font-weight="700" fill="url(#fTitleGrad)">// still building. always building.</text>
  </g>

  <rect x="905" y="72" width="12" height="22" fill="#39d353">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1;0;1" keyTimes="0;0.42;0.46;0.55;0.64;0.73;0.82;0.91;1" dur="12s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="140" text-anchor="middle" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="13" fill="#8b949e">
    made in a terminal, not a design tool.
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.6;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <g transform="translate(0,180)">
    <path d="M0,20 C150,0 300,40 450,20 C600,0 750,40 900,20 C1050,0 1150,20 1200,15 L1200,60 L0,60 Z" fill="#111826" opacity="0.7">
      <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;0 -4;0 0" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
