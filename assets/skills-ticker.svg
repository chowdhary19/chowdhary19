  <rect width="1200" height="60" fill="#05070a"/>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate" from="0 0" to="-2222 0" dur="26s" repeatCount="indefinite"/>
    <use xlink:href="#tickerSet" x="0" y="0"/>
    <use xlink:href="#tickerSet" x="2222" y="0"/>
  </g>

  <!-- edge fade masks -->
  <rect x="0" y="0" width="60" height="60" fill="url(#fadeLeft)"/>
  <rect x="1140" y="0" width="60" height="60" fill="url(#fadeRight)"/>
  <defs>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#05070a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#05070a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="1"/>
    </linearGradient>
  </defs>
