        <rect x="1286" y="10" width="44" height="34" rx="17"/>
        <rect x="1348" y="10" width="84" height="34" rx="17"/>
        <rect x="1450" y="10" width="64" height="34" rx="17"/>
        <rect x="1532" y="10" width="74" height="34" rx="17"/>
        <rect x="1624" y="10" width="124" height="34" rx="17"/>
        <rect x="1766" y="10" width="124" height="34" rx="17"/>
        <rect x="1908" y="10" width="124" height="34" rx="17"/>
        <rect x="2050" y="10" width="154" height="34" rx="17"/>
