        <rect x="284" y="10" width="144" height="34" rx="17"/>
        <rect x="446" y="10" width="154" height="34" rx="17"/>
        <rect x="618" y="10" width="134" height="34" rx="17"/>
        <rect x="770" y="10" width="154" height="34" rx="17"/>
        <rect x="942" y="10" width="164" height="34" rx="17"/>
        <rect x="1124" y="10" width="144" height="34" rx="17"/>
      </g>
      <g font-size="13" font-weight="700" fill="#a78bfa">
