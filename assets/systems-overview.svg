<text x="334" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" font-weight="600" fill="#C9C0B2" text-anchor="start" opacity="1.0">on-chain correctness</text>
</g>
