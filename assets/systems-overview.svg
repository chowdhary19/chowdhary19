<text x="334" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="800" fill="#F3EEE4" text-anchor="start" opacity="1.0">BLOCKCHAIN / DEFI</text>
