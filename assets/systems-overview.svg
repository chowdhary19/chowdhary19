<text x="604" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="800" fill="#F3EEE4" text-anchor="start" opacity="1.0">QUANT / FINANCIAL</text>
<line x1="604" y1="152" x2="796" y2="152" stroke="#28241E"/>
<text x="604" y="179" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" font-weight="600" fill="#C9C0B2" text-anchor="start" opacity="1.0">orders + fills</text>
