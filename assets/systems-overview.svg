<rect x="120" y="324" width="1160" height="124" rx="4" fill="#08150c" stroke="#27c957"/>
<text x="700" y="360" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13" font-weight="800" fill="#42ff78" text-anchor="middle" opacity="1.0">THE COMMON LAYER</text>
<text x="700" y="400" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="20" font-weight="850" fill="#c8ffd4" text-anchor="middle" opacity="1.0">CONTROL  ·  STATE  ·  MONEY  ·  LATENCY  ·  RECOVERY  ·  OPERATOR</text>
<text x="700" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="12" font-weight="650" fill="#27c957" text-anchor="middle" opacity="1.0">the system is only finished when the consequence is owned</text>
<path id="flow1" d="M170 386 H1230" fill="none" stroke="#12672d" stroke-width="1"/>
<circle cx="170" cy="386" r="5" fill="#42ff78" filter="url(#glow)" class="packet1"/>
<circle cx="1230" cy="386" r="4" fill="#27c957" class="packet2"/>
<path d="M700 448 V505" fill="none" stroke="#12672d" stroke-width="2" class="dash"/>
<rect x="255" y="505" width="890" height="92" rx="4" fill="#061009" stroke="#12672d"/>
<text x="282" y="540" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13" font-weight="800" fill="#42ff78" text-anchor="start" opacity="1.0">$ builder_mode</text>
<text x="282" y="575" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="650" fill="#c8ffd4" text-anchor="start" opacity="1.0">understand the business -&gt; find the invariant -&gt; build -&gt; operate -&gt; rewrite what reality disproves</text>
<text x="42" y="625" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="11" font-weight="650" fill="#12672d" text-anchor="start" opacity="1.0">breadth is not the point; end-to-end ownership is</text>
<g class="global-scan"><rect x="0" y="0" width="1400" height="1" fill="#42ff78" opacity=".16"/><rect x="0" y="1" width="1400" height="42" fill="url(#scanFadeY)" opacity=".11"/></g>
</svg>