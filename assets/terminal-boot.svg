<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="winClip">
      <rect x="0" y="0" width="900" height="400" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#winClip)">
    <rect x="0" y="0" width="900" height="400" fill="#0a0e14"/>
    <rect x="0" y="0" width="900" height="34" fill="#161b22"/>
    <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="17" r="6" fill="#27c93f"/>
    <text x="450" y="21" text-anchor="middle" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="12" fill="#8b949e">yuvraj@root &#8212; zsh &#8212; 110&#215;32</text>
    <rect x="0" y="34" width="900" height="1" fill="#21262d"/>

    <!-- L1 prompt: whoami -->
    <text x="30" y="76" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.033;0.053;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      $ whoami
    </text>
    <!-- L2 response -->
    <text x="30" y="104" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.089;0.109;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      &#8250; founding systems engineer &#8212; i build the infra other startups assume already exists
    </text>

    <!-- L3 prompt: north star -->
    <text x="30" y="152" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.189;0.209;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      $ cat north_star.md
    </text>
    <!-- L4 response -->
    <text x="30" y="180" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.244;0.264;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      &#8250; ship the control plane before the product ever has to ask for one
    </text>

    <!-- L5 prompt: status -->
    <text x="30" y="228" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.344;0.364;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      $ ./status.sh --all
    </text>
    <!-- L6 response -->
    <text x="30" y="256" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#39d353">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.400;0.420;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      &#8250; gateway: live &#183; policy: enforcing &#183; audit: unbroken &#183; sleep: negotiable
    </text>

    <!-- L7 prompt: philosophy -->
    <text x="30" y="304" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.500;0.520;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      $ echo $PHILOSOPHY
    </text>
    <!-- L8 response -->
    <text x="30" y="332" font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="14" font-weight="600" fill="#a78bfa">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.556;0.576;0.90;0.93;1" dur="18s" repeatCount="indefinite"/>
      &#8250; i just code. that's the whole bio.
    </text>

    <!-- blinking cursor -->
    <rect x="345" y="321" width="9" height="16" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
